<div class="flex h-full flex-col overflow-hidden rounded-lg border border-slate-800 bg-[#0f141a] shadow-lg">
  <!-- Color-coded live ticker -->
  <app-ticker-bar [label]="label()" [price]="price()" [direction]="direction()" />

  <!-- Per-pane controls -->
  <div class="flex flex-wrap items-center gap-2 border-b border-slate-800 bg-slate-900/60 px-3 py-2">
    <label class="sr-only" [attr.for]="pane().id + '-symbol'">Symbol</label>
    <select
      [id]="pane().id + '-symbol'"
      class="min-w-0 flex-1 rounded-md border border-slate-700 bg-slate-800 px-2 py-1 text-sm text-slate-100 focus:border-sky-500 focus:outline-none"
      [value]="pane().symbol"
      (change)="onSymbolChange($event)"
    >
      @if (symbolGroups(); as groups) {
        <optgroup label="Crypto">
          @for (s of groups.crypto; track s.symbol) {
            <option [value]="s.symbol">{{ s.label }}</option>
          }
        </optgroup>
        <optgroup label="Indian Stocks">
          @for (s of groups.indian_stock; track s.symbol) {
            <option [value]="s.symbol">{{ s.label }}</option>
          }
        </optgroup>
      } @else {
        <option [value]="pane().symbol">{{ pane().symbol }}</option>
      }
    </select>

    <!-- Timeframe toggle group -->
    <div class="flex overflow-hidden rounded-md border border-slate-700">
      @for (tf of intervals; track tf) {
        <button
          type="button"
          class="px-2 py-1 text-xs font-medium transition-colors"
          [class]="
            pane().interval === tf
              ? 'bg-sky-600 text-white'
              : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
          "
          (click)="onIntervalChange(tf)"
        >
          {{ tf }}
        </button>
      }
    </div>
  </div>

  <!-- Chart surface -->
  <div class="relative flex-1">
    <div #chartContainer class="absolute inset-0"></div>

    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-[#0f141a]/70 text-sm text-slate-400">
        Loading…
      </div>
    }
    @if (errorText(); as err) {
      <div class="absolute bottom-2 left-2 rounded bg-red-900/80 px-2 py-1 text-xs text-red-100">
        {{ err }}
      </div>
    }
  </div>
</div>
