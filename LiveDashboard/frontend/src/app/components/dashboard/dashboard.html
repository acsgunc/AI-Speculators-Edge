<div class="flex h-screen flex-col bg-[#0b0e11]">
  <!-- Header / toolbar -->
  <header
    class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-800 bg-slate-900/80 px-4 py-3 backdrop-blur"
  >
    <div class="flex items-center gap-2">
      <span class="text-lg font-bold text-sky-400">◧ Live Trading Dashboard</span>
      <span class="hidden text-xs text-slate-500 sm:inline">Crypto · Indian Equities</span>
    </div>

    <div class="flex items-center gap-2">
      <span class="text-sm text-slate-400">Charts:</span>
      <div class="flex overflow-hidden rounded-md border border-slate-700">
        @for (count of chartCounts; track count) {
          <button
            type="button"
            class="px-3 py-1 text-sm font-semibold transition-colors"
            [class]="
              state.config().chartCount === count
                ? 'bg-sky-600 text-white'
                : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
            "
            (click)="setChartCount(count)"
          >
            {{ count }}
          </button>
        }
      </div>
    </div>
  </header>

  <!-- Responsive chart grid -->
  <main class="flex-1 overflow-hidden p-3">
    <div class="grid h-full auto-rows-fr gap-3" [class]="gridClass()">
      @for (pane of state.config().panes; track pane.id) {
        <app-chart-pane [pane]="pane" [symbolGroups]="symbolGroups()" />
      }
    </div>
  </main>
</div>
